<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор КП · УКК Татстрой</title>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/pdfmake.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/vfs_fonts.js"></script>
<style>
:root{
  --bg:#d8e0ee;
  --txt:#1c1c1e; --txt2:#6e6e73;
  --glass:rgba(255,255,255,0.22); --card:rgba(255,255,255,0.28);
  --border:rgba(255,255,255,0.58); --spec:rgba(255,255,255,0.72);
  --shadow:0 2px 10px rgba(0,0,0,0.07);
  --accent:#007AFF; --accent-h:#0071e3; --tint:rgba(0,122,255,0.13);
  --modal:rgba(248,248,252,0.92);
}
html[data-theme="dark"]{
  --bg:#0f172a;
  --txt:#f2f2f7; --txt2:#8e8e93;
  --glass:rgba(30,30,35,0.45); --card:rgba(40,40,46,0.5);
  --border:rgba(255,255,255,0.10); --spec:rgba(255,255,255,0.07);
  --shadow:0 2px 14px rgba(0,0,0,0.35);
  --accent:#0A84FF; --accent-h:#3a9bff; --tint:rgba(10,132,255,0.18);
  --modal:rgba(28,28,33,0.92);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Inter','SF Pro Text',-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:450;font-size:13px;color:var(--txt);background:var(--bg);min-height:100vh;position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 12% 8%,rgba(185,195,240,.90),transparent 70%),
    radial-gradient(ellipse 55% 45% at 88% 6%,rgba(205,185,240,.80),transparent 70%),
    radial-gradient(ellipse 60% 55% at 90% 95%,rgba(170,210,235,.75),transparent 70%),
    radial-gradient(ellipse 55% 50% at 8% 92%,rgba(215,205,230,.70),transparent 70%)}
html[data-theme="dark"] body::before{background:
    radial-gradient(ellipse 60% 50% at 12% 8%,#9d174d99,transparent 70%),
    radial-gradient(ellipse 55% 45% at 88% 6%,#4c1d9599,transparent 70%),
    radial-gradient(ellipse 60% 55% at 90% 95%,#0c4a6e99,transparent 70%),
    radial-gradient(ellipse 55% 50% at 8% 92%,#7c2d1299,transparent 70%)}
.layout{display:grid;grid-template-columns:230px 1fr 340px;gap:16px;padding:16px;max-width:1500px;margin:0 auto;align-items:start}
.glass{background:var(--glass);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);
  border:1px solid var(--border);box-shadow:var(--shadow),inset 0 1.5px 0 var(--spec);border-radius:16px}
h2{font-size:14px;font-weight:600;letter-spacing:-.3px;margin:0}
.muted{color:var(--txt2)}
.sidebar{position:sticky;top:16px;padding:14px 10px;max-height:calc(100vh - 32px);overflow-y:auto}
.brand{display:flex;align-items:center;gap:9px;padding:4px 8px 12px}
.brand-dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#5856d6);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;
  box-shadow:0 1px 6px rgba(0,122,255,.4),inset 0 1px 0 rgba(255,255,255,.3)}
.navitem{display:flex;align-items:center;gap:8px;height:34px;padding:0 10px;border-radius:9px;cursor:pointer;
  transition:.14s;color:var(--txt);user-select:none;font-size:12.5px}
.navitem:hover{background:rgba(255,255,255,.18)}
.navitem.active{background:var(--tint);color:var(--accent);font-weight:600}
.navitem .cnt{margin-left:auto;font-size:10px;background:var(--accent);color:#fff;border-radius:8px;padding:1px 6px;min-width:16px;text-align:center}
.navitem .cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.main{display:flex;flex-direction:column;gap:14px;min-width:0}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;flex-wrap:wrap}
.toolbar-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.search{flex:1;min-width:140px;height:32px;border:1px solid var(--border);border-radius:9px;
  background:var(--card);padding:0 12px;color:var(--txt);font-size:13px;font-family:inherit;outline:none}
.search::placeholder{color:var(--txt2)}
.sec{padding:14px 16px;scroll-margin-top:16px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;user-select:none}
.sec-head h2{flex:1}
.chev{transition:.2s;color:var(--txt2);font-size:11px}
.sec.collapsed .chev{transform:rotate(-90deg)}
.sec.collapsed .items{display:none}
.selall{font-size:11px;color:var(--accent);cursor:pointer;padding:3px 8px;border-radius:7px;background:var(--tint)}
.items{display:flex;flex-direction:column;gap:6px}
.item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:11px;
  background:var(--card);border:1px solid transparent;transition:.14s;box-shadow:inset 0 1.5px 0 var(--spec)}
.item:hover{transform:translateY(-1px);background:rgba(255,255,255,.34)}
html[data-theme="dark"] .item:hover{background:rgba(255,255,255,.06)}
.item.on{border-color:var(--accent);background:var(--tint)}
.item.grp{background:transparent;box-shadow:none;font-weight:600;color:var(--txt2);
  font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding:8px 4px 2px;pointer-events:none}
.cb{width:19px;height:19px;border-radius:6px;border:1.6px solid var(--txt2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.14s;background:rgba(255,255,255,.3)}
.item.on .cb{background:var(--accent);border-color:var(--accent)}
.cb svg{opacity:0;transition:.14s}
.item.on .cb svg{opacity:1}
.iname{flex:1;line-height:1.35;cursor:pointer;font-size:12.5px}
.iprice{display:flex;align-items:center;gap:3px;flex-shrink:0}
.priceinp{width:100px;min-width:90px;height:28px;border:1px solid var(--border);border-radius:7px;
  background:var(--glass);color:var(--txt);text-align:right;padding:0 8px;
  font-size:12.5px;font-family:inherit;font-weight:600;outline:none}
.priceinp:focus{border-color:var(--accent)}
.rub{color:var(--txt2);font-size:12px}
.var{font-size:10px;color:var(--accent);background:var(--tint);padding:1px 5px;border-radius:5px;cursor:pointer;margin-left:4px}
.aside{position:sticky;top:16px;display:flex;flex-direction:column;gap:14px;max-height:calc(100vh - 32px);overflow-y:auto}
.panel{padding:14px 15px}
.field{margin-bottom:9px}
.field label{display:block;font-size:11px;color:var(--txt2);margin-bottom:3px;font-weight:500}
.inp,.ta{width:100%;border:1px solid var(--border);border-radius:8px;background:var(--card);
  color:var(--txt);padding:7px 10px;font-size:12.5px;font-family:inherit;outline:none;resize:vertical}
.inp:focus,.ta:focus{border-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cart-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:flex-start}
.cart-item:last-child{border:none}
.cart-x{color:var(--txt2);cursor:pointer;flex-shrink:0;font-size:14px;line-height:1;padding:2px}
.cart-x:hover{color:#e5484d}
.cart-name{flex:1;line-height:1.3}
.cart-price{font-weight:600;flex-shrink:0;white-space:nowrap}
.empty{color:var(--txt2);text-align:center;padding:18px 0;font-size:12px}
.total{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px;
  border-top:1.5px solid var(--border);font-weight:600;font-size:14px}
.btn{height:32px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:var(--glass);
  color:var(--txt);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:.14s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;box-shadow:inset 0 1px 0 var(--spec)}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.32)}
.btn:active{transform:scale(.98)}
html[data-theme="dark"] .btn:hover{background:rgba(255,255,255,.08)}
.btn.primary{background:var(--accent);color:#fff;border:none;
  box-shadow:0 1px 6px rgba(0,122,255,.4),inset 0 1px 0 rgba(255,255,255,.2)}
.btn.primary:hover{background:var(--accent-h)}
.btn.wide{width:100%}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn.danger{color:#e5484d;border-color:rgba(229,72,77,0.3)}
.btn.danger:hover{background:rgba(229,72,77,0.08);transform:translateY(-1px)}
.iconbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--glass);
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt);transition:.14s;
  box-shadow:inset 0 1px 0 var(--spec)}
.iconbtn:hover{transform:translateY(-1px)}
.menubtn{display:none}
@media(max-width:1100px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;width:240px;z-index:50;border-radius:0 16px 16px 0;
    transition:.22s cubic-bezier(.34,1.56,.64,1);max-height:100vh}
  .sidebar.open{left:0}
  .aside{position:static;max-height:none;overflow:visible}
  .menubtn{display:inline-flex}
  .overlay2{display:none;position:fixed;inset:0;background:rgba(0,0,0,.22);backdrop-filter:blur(4px);z-index:40}
  .overlay2.show{display:block}
}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(120,120,128,.3);border-radius:4px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--modal);backdrop-filter:blur(40px);border:1px solid var(--border);
  padding:11px 18px;border-radius:12px;font-size:13px;box-shadow:var(--shadow);z-index:100;
  opacity:0;transition:.3s cubic-bezier(.34,1.56,.64,1);font-weight:500}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>

  <aside class="sidebar glass" id="sidebar">

      <div class="field"><label>Вступительный текст</label><textarea class="ta" id="h_intro" rows="2">ЧОУ ДПО «Учебно-курсовой комбинат ОАО «Татстрой» предлагает пройти обучение по следующим программам сотрудникам Вашей организации:</textarea></div>
    </div>

    <div class="panel glass">
      <h2 style="margin-bottom:8px">Выбрано <span id="cartCnt" class="muted"></span></h2>
      <div id="cart"></div>
      <div class="total"><span>Итого по списку:</span><span id="grandTotal">0 ₽</span></div>
      <div class="btn-row">
        <button class="btn primary wide" onclick="genWord()">📄 Скачать Word</button>
      </div>
      <div class="btn-row">
        <button class="btn wide" onclick="genPDF()">📥 Скачать PDF</button>

        Подпись+печать вставляется автоматически.<br>
        PDF — без диалога, чистый файл (шрифт Roboto с кириллицей).
      </div>
    </div>
  </aside>
</div>

let selected = {};
const palette=['#007AFF','#34c759','#ff9500','#af52de','#ff2d55','#5ac8fa','#ffcc00','#5856d6','#ff3b30','#00c7be'];

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=SECTIONS.map((s,i)=>`
    <div class="navitem" data-nav="${i}" onclick="scrollToSec('${i}')">
      <span class="cdot" style="background:${palette[i%palette.length]}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</span>
      <span class="cnt" data-cnt="${i}" style="display:none">0</span>
    </div>`).join('');
}

function buildSections(){
  const cont=document.getElementById('sections');
  cont.innerHTML=SECTIONS.map((s,si)=>`
    <div class="sec glass" id="sec${si}" data-sec="${si}">
      <div class="sec-head" onclick="toggleSec(${si})">
        <span class="cdot" style="background:${palette[si%palette.length]};width:9px;height:9px;border-radius:50%"></span>
        <h2>${s.title}</h2>
        <span class="selall" onclick="event.stopPropagation();selSection(${si})">Выбрать всё</span>
        <span class="chev">▼</span>
      </div>
      <div class="items">
        ${s.items.map((it,ii)=>it.group
          ?`<div class="item grp">${it.name}</div>`
          :`<div class="item" id="it${si}_${ii}" data-name="${esc(it.name)}">
              <div class="cb" onclick="toggleItem(${si},${ii})">
                <svg width="11" height="11" viewBox="0 0 12 12"><path d="M2 6l2.5 2.5L10 3" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </div>
              <div class="iname" onclick="toggleItem(${si},${ii})">${it.name}${it.prices?` <span class="var" onclick="event.stopPropagation();cycleVar(${si},${ii})" id="var${si}_${ii}">вариант 1/${it.prices.length}</span>`:''}</div>
              <div class="iprice">
                <input class="priceinp" id="p${si}_${ii}" type="number" value="${it.price}" oninput="onPrice(${si},${ii})">
                <span class="rub">₽</span>
              </div>
            </div>`
        ).join('')}
      </div>
    </div>`).join('');
}

function esc(s){return s.replace(/"/g,'&quot;');}
function key(si,ii){return si+'_'+ii;}

function toggleSec(si){document.getElementById('sec'+si).classList.toggle('collapsed');}
function scrollToSec(si){
  document.getElementById('sec'+si).scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.navitem').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-nav="${si}"]`).classList.add('active');
  closeSidebar();
}

function toggleItem(si,ii){
  const it=SECTIONS[si].items[ii]; if(it.group)return;
  const el=document.getElementById('it'+si+'_'+ii);
  const k=key(si,ii);
  if(selected[k]){delete selected[k];el.classList.remove('on');}
  else{
    const price=parseInt(document.getElementById('p'+si+'_'+ii).value)||0;
    selected[k]={si,ii,sec:SECTIONS[si].title,name:it.name,price};
    el.classList.add('on');
  }
  render();
}

function selSection(si){
  SECTIONS[si].items.forEach((it,ii)=>{
    if(it.group)return;
    const k=key(si,ii);
    if(!selected[k]){
      const price=parseInt(document.getElementById('p'+si+'_'+ii).value)||0;
      selected[k]={si,ii,sec:SECTIONS[si].title,name:it.name,price};
      document.getElementById('it'+si+'_'+ii).classList.add('on');
    }
  });
  render();
}

function selectAllGlobal(){
  SECTIONS.forEach((s,si)=>{
    s.items.forEach((it,ii)=>{
      if(it.group)return;
      const k=key(si,ii);
      if(!selected[k]){
        const price=parseInt(document.getElementById('p'+si+'_'+ii).value)||0;
        selected[k]={si,ii,sec:s.title,name:it.name,price};
        document.getElementById('it'+si+'_'+ii).classList.add('on');
      }
    });
  });
  render();
  toast('Все программы выбраны');
}

function onPrice(si,ii){
  const k=key(si,ii);
  if(selected[k]){selected[k].price=parseInt(document.getElementById('p'+si+'_'+ii).value)||0;render();}
}

function cycleVar(si,ii){
  const it=SECTIONS[si].items[ii];
  it._v=((it._v||0)+1)%it.prices.length;
  document.getElementById('var'+si+'_'+ii).textContent=`вариант ${it._v+1}/${it.prices.length}`;
  document.getElementById('p'+si+'_'+ii).value=it.prices[it._v];
  onPrice(si,ii);
}

function clearAll(){
  selected={};
  document.querySelectorAll('.item.on').forEach(e=>e.classList.remove('on'));
  render();
}

function filterItems(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.sec').forEach(sec=>{
    let any=false;
    sec.querySelectorAll('.item:not(.grp)').forEach(it=>{
      const m=it.dataset.name.toLowerCase().includes(q);
      it.style.display=m?'':'none'; if(m)any=true;
    });
    sec.style.display=(any||!q)?'':'none';
    if(q)sec.classList.remove('collapsed');
  });
}

function render(){
  const items=Object.values(selected);
  const cart=document.getElementById('cart');
  if(!items.length){cart.innerHTML='<div class="empty">Отметьте программы слева</div>';}
  else{
    const bySec={};
    items.forEach(it=>{(bySec[it.sec]=bySec[it.sec]||[]).push(it);});
    cart.innerHTML=Object.entries(bySec).map(([sec,arr])=>`
      <div class="muted" style="font-size:10px;text-transform:uppercase;letter-spacing:.3px;margin:8px 0 3px">${sec}</div>
      ${arr.map(it=>`<div class="cart-item">
        <span class="cart-x" onclick="toggleItem(${it.si},${it.ii})">×</span>
        <span class="cart-name">${it.name}</span>
        <span class="cart-price">${it.price.toLocaleString('ru')} ₽</span>
      </div>`).join('')}`).join('');
  }
  const total=items.reduce((s,i)=>s+i.price,0);
  document.getElementById('grandTotal').textContent=total.toLocaleString('ru')+' ₽';
  document.getElementById('cartCnt').textContent=items.length?`· ${items.length}`:'';
  const cnt={};
  items.forEach(it=>cnt[it.si]=(cnt[it.si]||0)+1);
  document.querySelectorAll('[data-cnt]').forEach(b=>{
    const c=cnt[b.dataset.cnt];
    if(c){b.style.display='';b.textContent=c;}else{b.style.display='none';}
  });
}

function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',cur);
  document.getElementById('themeIcon').textContent=cur==='dark'?'☀️':'🌙';
  document.getElementById('themeLbl').textContent=cur==='dark'?' Светлая тема':' Тёмная тема';
  try{localStorage.setItem('kp_theme',cur);}catch(e){}
}
try{const t=localStorage.getItem('kp_theme');if(t){document.documentElement.setAttribute('data-theme',t);
  if(t==='dark'){document.getElementById('themeIcon').textContent='☀️';
    document.getElementById('themeLbl').textContent=' Светлая тема';}}}catch(e){}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('ov2').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('ov2').classList.remove('show');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

function H(id){return document.getElementById(id).value;}
function selectedBySection(){
  const items=Object.values(selected);
  if(!items.length)return null;
  const bySec={};
  items.forEach(it=>{(bySec[it.sec]=bySec[it.sec]||[]).push(it);});
  return bySec;
}
function b64toU8(b64){
  const bin=atob(b64);const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);return u8;
}

// =================== WORD ===================
async function genWord(){
  const bySec=selectedBySection();
  if(!bySec){toast('Сначала выберите программы');return;}
  if(typeof docx==='undefined'){toast('docx.js не загружен — проверьте интернет');return;}
  try { await _genWordInner(bySec); }
  catch(e){ console.error('genWord error:',e); toast('Ошибка: '+String(e.message||e)); }
}
async function _genWordInner(bySec){
  const D=docx;
  const {Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,
         AlignmentType,WidthType,BorderStyle,ShadingType,ImageRun,VerticalAlign}=D;

  const CW=9360;
  const nb={style:BorderStyle.NONE,size:0,color:'FFFFFF'};
  // insideH / insideV — корректные имена для Table.borders в docx.js 8.x
  const nbAll={top:nb,bottom:nb,left:nb,right:nb,insideH:nb,insideV:nb};
  const tb={style:BorderStyle.SINGLE,size:4,color:'000000'};
  const tbAll={top:tb,bottom:tb,left:tb,right:tb};

  function p(text,o={}){
    const cfg={
      alignment:o.align||AlignmentType.LEFT,
      spacing:{after:o.after??40,before:o.before??0},
      children:[new TextRun({text,bold:o.bold,size:o.size||22,italics:o.it,
        font:o.font||'Times New Roman',color:o.color})]
    };
    if(o.indent) cfg.indent=o.indent;
    if(o.border) cfg.border=o.border;
    return new Paragraph(cfg);
  }
  function makeCell(text,w,opts={}){
    const brd=opts.noBdr?{top:nb,bottom:nb,left:nb,right:nb}:tbAll;
    return new TableCell({
      borders:brd,width:{size:w,type:WidthType.DXA},
      shading:opts.shade?{fill:opts.shade,type:ShadingType.CLEAR}:undefined,
      margins:{top:80,bottom:80,left:120,right:120},
      verticalAlign:VerticalAlign.CENTER,
      children:[new Paragraph({
        alignment:opts.align||AlignmentType.LEFT,
        children:[new TextRun({text,bold:opts.bold,size:opts.size||22,
          font:opts.font||'Times New Roman',color:opts.color})]
      })]
    });
  }
  function cgRun(text,sz,color){
    return new TextRun({text,bold:true,size:sz,font:'Century Gothic',color});
  }
  function cgPar(text,sz,color,after=16){
    return new Paragraph({spacing:{after},
      children:[cgRun(text,sz,color)]});
  }

  // Header table (logo | org text)
  const logoU8=b64toU8(LOGO_B64);
  const signU8=b64toU8(SIGN_B64);

  const reqLines=H('h_req').split('\n');
  const accLines=H('h_acc').split('\n');
  const adrLines=H('h_adr').split('\n');

  const orgCellKids=[
    cgPar('Частное образовательное учреждение',20,'ED7D31',8),
    cgPar('дополнительного профессионального образования',18,'215D80',8),
    cgPar('«Учебно-курсовой комбинат ОАО «ТАТСТРОЙ»',20,'ED7D31',10),
    ...reqLines.map(l=>cgPar(l,16,'336699',4)),
    ...accLines.map(l=>cgPar(l,16,'336699',4)),
    ...adrLines.map(l=>cgPar(l,16,'336699',0)),
  ];

  const logoColW=3600, orgColW=CW-3600;
  const headerTbl=new Table({
    width:{size:CW,type:WidthType.DXA},
    columnWidths:[logoColW,orgColW],
    borders:nbAll,
    rows:[new TableRow({children:[
      new TableCell({borders:{top:nb,bottom:nb,left:nb,right:nb},
        width:{size:logoColW,type:WidthType.DXA},
        margins:{top:0,bottom:0,left:0,right:100},
        verticalAlign:VerticalAlign.TOP,
        children:[new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:0},
          children:[new ImageRun({type:'png',data:logoU8,transformation:{width:108,height:91}})]})]
      }),
      new TableCell({borders:{top:nb,bottom:nb,left:nb,right:nb},
        width:{size:orgColW,type:WidthType.DXA},
        margins:{top:0,bottom:0,left:60,right:0},
        verticalAlign:VerticalAlign.TOP,
        children:orgCellKids
      }),
    ]})]
  });

  const kids=[];
  kids.push(headerTbl);

  // ТАТСТРОЙ + underline
  kids.push(new Paragraph({alignment:AlignmentType.LEFT,spacing:{before:60,after:0},
    children:[new TextRun({text:'      ТАТСТРОЙ',bold:true,size:44,font:'Century Gothic',color:'ED7D31'})]}));
  kids.push(new Paragraph({alignment:AlignmentType.LEFT,spacing:{before:0,after:100},
    border:{bottom:{style:BorderStyle.SINGLE,size:8,color:'333333',space:4}},
    children:[new TextRun({text:'',size:4})]}));

  // №/Дата | Кому
  const hw=Math.round(CW*0.45);
  kids.push(new Table({width:{size:CW,type:WidthType.DXA},columnWidths:[hw,CW-hw],borders:nbAll,
    rows:[new TableRow({children:[
      new TableCell({borders:{top:nb,bottom:nb,left:nb,right:nb},width:{size:hw,type:WidthType.DXA},
        margins:{top:0,bottom:0,left:0,right:0},
        children:[new Paragraph({spacing:{after:0},children:[
          new TextRun({text:`№ ${H('h_num')}   от  «${H('h_date')}»`,bold:true,size:24,font:'Times New Roman'})
        ]})]
      }),
      new TableCell({borders:{top:nb,bottom:nb,left:nb,right:nb},width:{size:CW-hw,type:WidthType.DXA},
        margins:{top:0,bottom:0,left:0,right:0},
        children:[new Paragraph({alignment:AlignmentType.RIGHT,spacing:{after:0},children:[
          new TextRun({text:H('h_to'),bold:true,size:24,font:'Times New Roman'})
        ]})]
      }),
    ]})]
  }));

  kids.push(p('КОММЕРЧЕСКОЕ ПРЕДЛОЖЕНИЕ',{align:AlignmentType.CENTER,bold:true,size:28,before:140,after:100}));
  kids.push(p(H('h_intro'),{size:22,after:120,indent:{firstLine:708},align:AlignmentType.BOTH}));

  // Разделы — 2 колонки как в оригинале
  const nameW=Math.round(CW*0.82), priceW=CW-Math.round(CW*0.82);
  for(const [sec,arr] of Object.entries(bySec)){
    kids.push(p(sec,{align:AlignmentType.CENTER,bold:true,size:22,before:100,after:60,font:'Century Gothic'}));
    const hdrRow=new TableRow({tableHeader:true,children:[
      makeCell('Направление подготовки',nameW,{bold:true,shade:'E8EEF7',size:20}),
      makeCell('Стоимость, руб.',priceW,{bold:true,shade:'E8EEF7',align:AlignmentType.CENTER,size:20}),
    ]});
    const dataRows=arr.map(it=>new TableRow({children:[
      makeCell(it.name,nameW,{size:20}),
      makeCell(it.price.toLocaleString('ru'),priceW,{align:AlignmentType.CENTER,bold:true,size:20}),
    ]}));
    kids.push(new Table({width:{size:CW,type:WidthType.DXA},columnWidths:[nameW,priceW],rows:[hdrRow,...dataRows]}));
    kids.push(p('',{after:60}));
  }

  // Итого
  const total=Object.values(selected).reduce((s,i)=>s+i.price,0);
  kids.push(new Table({width:{size:CW,type:WidthType.DXA},columnWidths:[nameW,priceW],
    rows:[new TableRow({children:[
      makeCell('ИТОГО по перечню:',nameW,{bold:true,align:AlignmentType.RIGHT,shade:'F2F6FC',size:22}),
      makeCell(total.toLocaleString('ru')+' ₽',priceW,{bold:true,align:AlignmentType.CENTER,shade:'F2F6FC',size:22}),
    ]})]
  }));

  // Закрывающий текст + подпись — держатся вместе на одной странице
  kids.push(p('',{before:120,after:0}));
  kids.push(p('Надеемся на плодотворное сотрудничество!',{size:22,before:0,after:40,bold:false}));
  kids.push(p('По вопросам обучения и оформления документов: тел. 239-11-17, 203-33-37',{size:20,after:20}));
  kids.push(p('г. Казань, ул. Ахтямова, 1   |   e-mail: ukk.tatstroi@mail.ru',{size:20,after:80}));
  kids.push(new Paragraph({spacing:{before:0,after:0},
    children:[new ImageRun({type:'png',data:signU8,transformation:{width:530,height:165}})]}));

  const doc=new Document({
    styles:{default:{document:{run:{font:'Times New Roman',size:22}}}},
    sections:[{
      properties:{page:{
        size:{width:11906,height:16838},
        margin:{top:567,right:1080,bottom:720,left:1080}
      }},
      children:kids
    }]
  });

  const blob=await Packer.toBlob(doc);
  saveAs(blob,`КП_${H('h_num')}_${new Date().toISOString().slice(0,10)}.docx`);
  toast('Word скачан ✓');
}

// =================== PDF (pdfmake) ===================
function genPDF(){
  const bySec=selectedBySection();
  if(!bySec){toast('Сначала выберите программы');return;}
  if(typeof pdfMake==='undefined'){toast('pdfmake ещё загружается…');return;}

  const total=Object.values(selected).reduce((s,i)=>s+i.price,0);
  const num=H('h_num'), date=H('h_date'), to=H('h_to');
  const reqLines=H('h_req').split('\n');
  const accLines=H('h_acc').split('\n');
  const adrLines=H('h_adr').split('\n');

  const headerStack=[
    {text:'Частное образовательное учреждение',bold:true,fontSize:9,color:'#ED7D31',margin:[0,0,0,1]},

    ...adrLines.map(l=>({text:l,bold:true,fontSize:7.5,color:'#336699',margin:[0,0,0,0]})),

  const content=[];

  // Шапка

  // Заголовок КП
  content.push({text:'КОММЕРЧЕСКОЕ ПРЕДЛОЖЕНИЕ',bold:true,fontSize:14,alignment:'center',margin:[0,5,0,5]});

  // Вступление
  content.push({text:H('h_intro'),fontSize:11,alignment:'justify',margin:[0,0,0,7]});

    content.push({
      table:{
        widths:['*',75],headerRows:1,
        body:[
          [{text:'Направление подготовки',bold:true,fillColor:'#E8EEF7',fontSize:9.5},
           {text:'Стоимость, руб.',bold:true,fillColor:'#E8EEF7',fontSize:9.5,alignment:'center'}],
          ...arr.map(it=>[
            {text:it.name,fontSize:9.5},
            {text:it.price.toLocaleString('ru'),fontSize:9.5,alignment:'center',bold:true}
          ])
        ]
      },
      layout:{
        hLineWidth:()=>0.5,vLineWidth:()=>0.5,
        hLineColor:()=>'#888',vLineColor:()=>'#888',
        paddingLeft:()=>5,paddingRight:()=>5,paddingTop:()=>3,paddingBottom:()=>3
      },
      margin:[0,0,0,5]
    });
  }

  // Итого
  content.push({
    table:{widths:['*',75],body:[[
      {text:'ИТОГО по перечню:',bold:true,fillColor:'#F2F6FC',fontSize:11,alignment:'right'},
      {text:total.toLocaleString('ru')+' ₽',bold:true,fillColor:'#F2F6FC',fontSize:11,alignment:'center'}
    ]]},
    layout:{hLineWidth:()=>0.5,vLineWidth:()=>0.5,hLineColor:()=>'#888',vLineColor:()=>'#888',
      paddingLeft:()=>5,paddingRight:()=>5,paddingTop:()=>4,paddingBottom:()=>4},

  });

  // Закрывающий текст + подпись
  content.push({
    stack:[
      {text:'Надеемся на плодотворное сотрудничество!',fontSize:11,margin:[0,12,0,4]},
      {text:'По вопросам обучения и оформления документов: тел. 239-11-17, 203-33-37',fontSize:9.5,color:'#444',margin:[0,0,0,2]},
